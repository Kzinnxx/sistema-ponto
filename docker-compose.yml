services:
  postgres:
    image: postgres:15
    container_name: ponto_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senha123
      POSTGRES_DB: sistema_ponto
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ponto_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: senha123

  redis:
    image: redis:7
    container_name: ponto_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:

  